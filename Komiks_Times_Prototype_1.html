<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<title>The Komiks Times · Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800;9..144,900&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --ink: #0a0a0a;
    --paper: #fafaf7;
    --paper2: #f0eee9;
    --rule: #0a0a0a;
    --mute: #6b6862;
    --accent: #c83a2c;
  }

  html, body {
    margin: 0; padding: 0;
    background: #1a1a1a;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  *, *::before, *::after { box-sizing: border-box; }

  /* Phone shell */
  #root {
    width: 390px;
    height: 844px;
    background: var(--paper);
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    border-radius: 44px;
  }

  /* Screen transitions */
  .screen {
    position: absolute;
    inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.32s;
  }
  .screen.enter  { transform: translateX(100%); opacity: 0; }
  .screen.active { transform: translateX(0);    opacity: 1; }
  .screen.exit   { transform: translateX(-100%); opacity: 0; pointer-events: none; }

  .serif { font-family: 'Fraunces', serif; }
  .mono  { font-family: 'JetBrains Mono', monospace; }

  /* Scrollable area inside screen */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* Tag chip */
  .tag-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 7px 13px;
    border: 1px solid var(--ink);
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-chip.on  { background: var(--ink); color: var(--paper); }
  .tag-chip.off { background: transparent; color: var(--ink); }
  .tag-chip:hover { opacity: 0.8; }

  /* Primary button */
  .btn-primary {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 22px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.12s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { opacity: 0.7; }

  .btn-outline {
    width: 100%;
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--ink);
    padding: 16px 18px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  .btn-outline:hover { background: rgba(0,0,0,0.04); }

  /* Nav bar */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-track {
    height: 2px;
    background: #e0ddd6;
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    transition: width 0.3s ease;
  }

  /* Camera roll grid item */
  .roll-thumb {
    position: relative;
    background: #1a1a1a;
    height: 90px;
    cursor: pointer;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.12s;
  }
  .roll-thumb:hover { opacity: 0.85; }
  .roll-thumb.selected::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid var(--accent);
  }
  .roll-thumb svg { position: absolute; inset: 0; }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--rule);
    padding: 44px 18px;
    text-align: center;
    background: #fff;
    cursor: pointer;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .drop-zone:hover, .drop-zone.drag-over { background: #f5f3ee; }

  /* Status bar */
  .status-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    flex-shrink: 0;
  }

  /* Success pulse */
  @keyframes pulse-in {
    0%   { transform: scale(0.94); opacity: 0; }
    60%  { transform: scale(1.02); }
    100% { transform: scale(1);    opacity: 1; }
  }
  .pulse-in { animation: pulse-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  /* Loading bar for upload */
  @keyframes loading {
    0%   { width: 0%; }
    80%  { width: 90%; }
    100% { width: 100%; }
  }
  .loading-bar {
    height: 3px;
    background: var(--ink);
    animation: loading 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  /* Mobile only */
  @media (max-width: 440px) {
    html, body { align-items: flex-start; }
    #root {
      width: 100vw;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
    .screen { border-radius: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Atoms ────────────────────────────────────────────────────

const StatusBar = ({ dark }) => (
  <div className="status-bar mono" style={{ color: dark ? '#fafaf7' : '#0a0a0a' }}>
    <span style={{ fontSize: 13, fontWeight: 500 }}>9:41</span>
    <span style={{ fontSize: 11, display: 'flex', gap: 4, alignItems: 'center' }}>
      <span>●●●</span><span>87%</span>
    </span>
  </div>
);

const Masthead = ({ dark, small }) => (
  <div style={{
    borderTop: `1px solid ${dark ? '#fafaf7' : '#0a0a0a'}`,
    borderBottom: `1px solid ${dark ? '#fafaf7' : '#0a0a0a'}`,
    padding: small ? '8px 18px' : '12px 22px',
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    color: dark ? '#fafaf7' : '#0a0a0a',
    flexShrink: 0,
  }}>
    <span className="mono" style={{ fontSize: 9, letterSpacing: 1.5, opacity: 0.7 }}>NO. 09</span>
    <div style={{ textAlign: 'center', lineHeight: 0.95 }}>
      <div style={{ fontFamily: 'Inter', fontWeight: 300, fontSize: 8, letterSpacing: '0.5em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 3 }}>THE</div>
      <div className="serif" style={{ fontSize: small ? 20 : 26, fontWeight: 800, letterSpacing: -0.5 }}>Komiks Times</div>
    </div>
    <span className="mono" style={{ fontSize: 9, letterSpacing: 1.5, opacity: 0.7 }}>APR 27 · 26</span>
  </div>
);

const XThumb = ({ style, label, duration }) => (
  <div style={{ position: 'relative', background: '#1a1a1a', overflow: 'hidden', ...style }}>
    <svg width="100%" height="100%" style={{ position: 'absolute', inset: 0 }} preserveAspectRatio="none">
      <line x1="0" y1="0" x2="100%" y2="100%" stroke="#2a2a2a" strokeWidth="1"/>
      <line x1="100%" y1="0" x2="0" y2="100%" stroke="#2a2a2a" strokeWidth="1"/>
    </svg>
    {label && <span className="mono" style={{ position: 'absolute', left: 8, bottom: 6, fontSize: 9, color: '#fafaf7', letterSpacing: 1, textTransform: 'uppercase' }}>{label}</span>}
    {duration && <span className="mono" style={{ position: 'absolute', right: 4, bottom: 4, fontSize: 9, color: '#fff', background: '#0a0a0a', padding: '1px 4px' }}>{duration}</span>}
  </div>
);

// ── Screen: Landing ──────────────────────────────────────────

const ScreenLanding = ({ onNext }) => (
  <div className="screen active" style={{ flexDirection: 'column' }}>
    <StatusBar />
    <Masthead />

    <div className="scroll-body">
      {/* date strap */}
      <div className="mono" style={{
        display: 'flex', justifyContent: 'space-between',
        padding: '10px 22px', fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)',
        borderBottom: '1px solid var(--rule)',
      }}>
        <span>POST-FESTIVAL EDITION</span>
        <span>★ ★ ★</span>
      </div>

      {/* hero */}
      <div style={{ padding: '32px 22px 24px' }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: 2, color: 'var(--accent)', marginBottom: 14 }}>
          ▸ READER SUBMISSIONS OPEN
        </div>
        <h1 className="serif" style={{ margin: 0, fontSize: 52, fontWeight: 900, lineHeight: 0.92, letterSpacing: -1.5 }}>
          We were<br/>
          <em style={{ fontStyle: 'italic', fontWeight: 800 }}>there.</em><br/>
          Were<br/>you?
        </h1>
        <p style={{ marginTop: 18, fontSize: 14, lineHeight: 1.55, color: '#1a1a1a', maxWidth: 320 }}>
          Send us the footage from your phone. The best
          frames make the official aftermovie. No filters, no
          posing — just what actually happened.
        </p>
      </div>

      {/* CTA */}
      <div style={{ padding: '0 22px' }}>
        <button className="btn-primary" onClick={onNext}>
          <span className="serif" style={{ fontSize: 22, fontWeight: 600, letterSpacing: -0.3 }}>Submit your video</span>
          <span style={{ fontSize: 22 }}>→</span>
        </button>
        <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginTop: 8, textAlign: 'center' }}>
          MP4 · MOV · MAX 500 MB · ANONYMOUS OK
        </div>
      </div>

      {/* live stats */}
      <div style={{
        margin: '28px 22px 0', padding: '16px 0',
        borderTop: '1px solid var(--rule)', borderBottom: '1px solid var(--rule)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
      }}>
        <div>
          <div className="serif" style={{ fontSize: 36, fontWeight: 800, lineHeight: 1 }}>247</div>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginTop: 2 }}>SUBMISSIONS</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div className="serif" style={{ fontSize: 36, fontWeight: 800, lineHeight: 1 }}>4.7<span style={{ fontSize: 18, opacity: 0.5 }}>/5</span></div>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginTop: 2 }}>READER RATING</div>
        </div>
      </div>

      {/* secondary links */}
      <div style={{ padding: '16px 22px 0' }}>
        {[['Rate the show', '★'], ['Write a letter', '✎'], ['Read the gallery', '↗']].map(([t, i]) => (
          <div key={t} style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '14px 0', borderBottom: '1px solid #d8d4cc', cursor: 'pointer',
          }}>
            <span className="serif" style={{ fontSize: 18, fontWeight: 600 }}>{t}</span>
            <span style={{ fontSize: 16, color: 'var(--mute)' }}>{i}</span>
          </div>
        ))}
      </div>

      {/* footer */}
      <div className="mono" style={{
        padding: '20px 22px', fontSize: 9, letterSpacing: 1.5,
        color: 'var(--mute)', textAlign: 'center',
        borderTop: '1px solid #d8d4cc', marginTop: 8,
      }}>
        IG · FB · SC · RA · GOOUT
      </div>
    </div>
  </div>
);

// ── Screen: Pick ─────────────────────────────────────────────

const MOCK_CLIPS = [
  { id: 1, dur: '1:24' }, { id: 2, dur: '0:42' }, { id: 3, dur: '0:18' },
  { id: 4, dur: '2:03' }, { id: 5, dur: '0:55' }, { id: 6, dur: '1:11' },
];

const ScreenPick = ({ onBack, onNext, selectedClip, onSelectClip }) => {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file) {
      onSelectClip({ id: 'file', dur: '?:??', name: file.name });
      onNext();
    }
  };

  const handleFileInput = (e) => {
    const file = e.target.files[0];
    if (file) {
      onSelectClip({ id: 'file', dur: '?:??', name: file.name });
      onNext();
    }
  };

  const pickClip = (clip) => {
    onSelectClip(clip);
  };

  return (
    <div className="screen active">
      <StatusBar />

      <div className="nav-bar">
        <span style={{ fontSize: 20, cursor: 'pointer', padding: '4px 8px 4px 0' }} onClick={onBack}>←</span>
        <span className="mono" style={{ fontSize: 10, letterSpacing: 1.5 }}>SUBMIT · STEP 1 / 3</span>
        <span style={{ fontSize: 16, color: 'var(--mute)', width: 28 }}>?</span>
      </div>
      <div className="progress-track"><div className="progress-fill" style={{ width: '33%' }} /></div>

      <div className="scroll-body">
        <div style={{ padding: '28px 22px 0' }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: 2, color: 'var(--accent)', marginBottom: 10 }}>
            ▸ PICK YOUR CLIP
          </div>
          <h1 className="serif" style={{ margin: 0, fontSize: 38, fontWeight: 800, lineHeight: 0.95, letterSpacing: -1 }}>
            What did<br/>you film?
          </h1>
        </div>

        {/* drop zone */}
        <div style={{ padding: '24px 22px 0' }}>
          <input ref={inputRef} type="file" accept="video/*" style={{ display: 'none' }} onChange={handleFileInput} />
          <div
            className={`drop-zone ${dragOver ? 'drag-over' : ''}`}
            onClick={() => inputRef.current.click()}
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={handleDrop}
          >
            <div style={{ fontSize: 32, marginBottom: 8 }}>↑</div>
            <div className="serif" style={{ fontSize: 20, fontWeight: 700 }}>Tap to pick</div>
            <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginTop: 10 }}>
              OR DROP A FILE HERE
            </div>
          </div>
        </div>

        {/* camera roll */}
        <div style={{ padding: '24px 22px 16px' }}>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginBottom: 10 }}>
            FROM CAMERA ROLL · LAST 48H
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 4 }}>
            {MOCK_CLIPS.map((clip) => (
              <div
                key={clip.id}
                className={`roll-thumb ${selectedClip?.id === clip.id ? 'selected' : ''}`}
                onClick={() => { pickClip(clip); onNext(); }}
              >
                <svg width="100%" height="100%" preserveAspectRatio="none">
                  <line x1="0" y1="0" x2="100%" y2="100%" stroke="#2a2a2a" strokeWidth="1"/>
                  <line x1="100%" y1="0" x2="0" y2="100%" stroke="#2a2a2a" strokeWidth="1"/>
                </svg>
                <span className="mono" style={{ position: 'absolute', right: 4, bottom: 4, fontSize: 9, color: '#fff', background: '#0a0a0a', padding: '1px 4px' }}>{clip.dur}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="mono" style={{ padding: '12px 22px 20px', fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', textAlign: 'center', borderTop: '1px solid #d8d4cc' }}>
          BY SUBMITTING YOU AGREE TO THE TERMS
        </div>
      </div>
    </div>
  );
};

// ── Screen: Tag ──────────────────────────────────────────────

const STAGES = ['main', 'second', 'outdoor', 'backstage'];
const VIBES  = ['mosh pit', 'crowd', 'fire', 'set drop', 'quiet'];

const ScreenTag = ({ onBack, onNext, selectedClip, tags, onToggleTag }) => {
  const [handle, setHandle] = useState('');

  return (
    <div className="screen active">
      <StatusBar />

      <div className="nav-bar">
        <span style={{ fontSize: 20, cursor: 'pointer', padding: '4px 8px 4px 0' }} onClick={onBack}>←</span>
        <span className="mono" style={{ fontSize: 10, letterSpacing: 1.5 }}>SUBMIT · STEP 2 / 3</span>
        <span className="mono" style={{ fontSize: 10, color: 'var(--mute)', cursor: 'pointer' }} onClick={onNext}>SKIP</span>
      </div>
      <div className="progress-track"><div className="progress-fill" style={{ width: '66%' }} /></div>

      <div className="scroll-body">
        <div style={{ padding: '24px 22px 0' }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: 2, color: 'var(--accent)', marginBottom: 10 }}>
            ▸ ADD CONTEXT
          </div>
          <h1 className="serif" style={{ margin: 0, fontSize: 32, fontWeight: 800, lineHeight: 0.95, letterSpacing: -1 }}>
            Where &amp; when?
          </h1>
        </div>

        {/* preview */}
        <div style={{ padding: '20px 22px 0' }}>
          <XThumb
            style={{ width: '100%', height: 180 }}
            label={selectedClip?.name || `${selectedClip?.dur || '0:42'} · IMG_4823.MOV`}
          />
        </div>

        {/* stage tags */}
        <div style={{ padding: '20px 22px 0' }}>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginBottom: 8 }}>STAGE</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {STAGES.map((t) => (
              <span
                key={t}
                className={`tag-chip ${tags.stage === t ? 'on' : 'off'}`}
                onClick={() => onToggleTag('stage', t)}
              >{t}</span>
            ))}
          </div>
        </div>

        {/* vibe tags */}
        <div style={{ padding: '18px 22px 0' }}>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginBottom: 8 }}>VIBE</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {VIBES.map((t) => (
              <span
                key={t}
                className={`tag-chip ${tags.vibes.includes(t) ? 'on' : 'off'}`}
                onClick={() => onToggleTag('vibe', t)}
              >{t}</span>
            ))}
          </div>
        </div>

        {/* handle */}
        <div style={{ padding: '18px 22px 28px' }}>
          <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)', marginBottom: 8 }}>YOUR HANDLE (OPTIONAL)</div>
          <input
            className="mono"
            placeholder="@anon"
            value={handle}
            onChange={(e) => setHandle(e.target.value)}
            style={{
              width: '100%', border: 'none', borderBottom: '1px solid var(--rule)',
              background: 'transparent', padding: '8px 0', fontSize: 14,
              fontFamily: 'JetBrains Mono', outline: 'none', color: 'var(--ink)',
            }}
          />
        </div>
      </div>

      {/* sticky CTA */}
      <div style={{ padding: '0 22px 24px', flexShrink: 0 }}>
        <button className="btn-primary" onClick={onNext}>
          <span className="serif" style={{ fontSize: 20, fontWeight: 600 }}>Send it</span>
          <span style={{ fontSize: 18 }}>→</span>
        </button>
      </div>
    </div>
  );
};

// ── Screen: Uploading ────────────────────────────────────────

const ScreenUploading = ({ onDone }) => {
  useEffect(() => {
    const t = setTimeout(onDone, 2000);
    return () => clearTimeout(t);
  }, [onDone]);

  return (
    <div className="screen active" style={{ justifyContent: 'center', alignItems: 'center' }}>
      <div style={{ textAlign: 'center', padding: '0 40px' }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: 2, color: 'var(--accent)', marginBottom: 24 }}>
          ▸ FILING YOUR STORY
        </div>
        <h2 className="serif" style={{ margin: '0 0 32px', fontSize: 38, fontWeight: 800, letterSpacing: -1, lineHeight: 0.95 }}>
          Sending<br/>your clip…
        </h2>
        <div style={{ width: '100%', background: '#e0ddd6', height: 3, overflow: 'hidden', marginBottom: 16 }}>
          <div className="loading-bar" />
        </div>
        <div className="mono" style={{ fontSize: 9, letterSpacing: 1.5, color: 'var(--mute)' }}>
          DO NOT CLOSE THIS TAB
        </div>
      </div>
    </div>
  );
};

// ── Screen: Done ─────────────────────────────────────────────

const ScreenDone = ({ onReset, submissionId }) => (
  <div className="screen active">
    <StatusBar />
    <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '10px 18px', borderBottom: '1px solid var(--rule)', flexShrink: 0 }}>
      <span className="mono" style={{ fontSize: 10, letterSpacing: 1.5 }}>3 / 3 · DONE</span>
    </div>

    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 22px' }}>
      <div className="pulse-in">
        <div className="mono" style={{ fontSize: 10, letterSpacing: 2, color: 'var(--accent)', marginBottom: 16 }}>
          ▸ FILED
        </div>
        <h1 className="serif" style={{ margin: 0, fontSize: 52, fontWeight: 900, lineHeight: 0.9, letterSpacing: -1.8 }}>
          You're<br/>on the<br/>record.
        </h1>
        <p style={{ marginTop: 22, fontSize: 14, lineHeight: 1.55, color: '#1a1a1a', maxWidth: 300 }}>
          Submission{' '}
          <span className="mono" style={{ background: '#0a0a0a', color: '#fff', padding: '1px 6px', fontSize: 12 }}>
            #{submissionId}
          </span>{' '}
          received. We'll watch it within 24h. If it makes the cut, you'll see your handle in the credits.
        </p>

        <div style={{
          marginTop: 28, padding: '14px 0',
          borderTop: '1px solid var(--rule)', borderBottom: '1px solid var(--rule)',
          display: 'flex', justifyContent: 'space-between',
        }}>
          <span className="mono" style={{ fontSize: 10, letterSpacing: 1.5 }}>STATUS</span>
          <span className="mono" style={{ fontSize: 10, letterSpacing: 1.5 }}>● IN REVIEW</span>
        </div>
      </div>
    </div>

    <div style={{ padding: '0 22px 32px', display: 'flex', flexDirection: 'column', gap: 10, flexShrink: 0 }}>
      <button className="btn-outline">
        <span className="serif" style={{ fontSize: 17, fontWeight: 600 }}>Rate the show →</span>
      </button>
      <button
        className="mono"
        onClick={onReset}
        style={{
          width: '100%', background: 'transparent', color: 'var(--mute)',
          border: 'none', padding: '10px 18px', cursor: 'pointer',
          fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
        }}
      >
        Submit another clip
      </button>
    </div>
  </div>
);

// ── App ──────────────────────────────────────────────────────

const SCREENS = ['landing', 'pick', 'tag', 'uploading', 'done'];

function App() {
  const [screen, setScreen] = useState('landing');
  const [selectedClip, setSelectedClip] = useState(null);
  const [tags, setTags] = useState({ stage: null, vibes: [] });
  const [submissionId, setSubmissionId] = useState(248);

  const go = (to) => setScreen(to);

  const handleToggleTag = (type, value) => {
    if (type === 'stage') {
      setTags(t => ({ ...t, stage: t.stage === value ? null : value }));
    } else {
      setTags(t => ({
        ...t,
        vibes: t.vibes.includes(value)
          ? t.vibes.filter(v => v !== value)
          : [...t.vibes, value],
      }));
    }
  };

  const handleReset = () => {
    setSelectedClip(null);
    setTags({ stage: null, vibes: [] });
    setSubmissionId(id => id + 1);
    go('landing');
  };

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      {screen === 'landing'   && <ScreenLanding onNext={() => go('pick')} />}
      {screen === 'pick'      && <ScreenPick onBack={() => go('landing')} onNext={() => go('tag')} selectedClip={selectedClip} onSelectClip={setSelectedClip} />}
      {screen === 'tag'       && <ScreenTag onBack={() => go('pick')} onNext={() => go('uploading')} selectedClip={selectedClip} tags={tags} onToggleTag={handleToggleTag} />}
      {screen === 'uploading' && <ScreenUploading onDone={() => go('done')} />}
      {screen === 'done'      && <ScreenDone onReset={handleReset} submissionId={submissionId} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
